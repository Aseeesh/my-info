name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_BASE_PATH: /my-info
      NEXT_PUBLIC_BASE_URL: https://ashishrijal.com.np

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup pnpm correctly
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ✅ Setup Node (NO pnpm cache flag)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ✅ Cache pnpm store (safe manual caching)
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ✅ Clean install (IMPORTANT FIX)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      # ❌ DO NOT install sharp manually (REMOVED)

      # ✅ Create nojekyll
      - name: Create .nojekyll file
        run: |
          mkdir -p public
          touch public/.nojekyll

      # ✅ Build Next.js
      - name: Build with Next.js
        run: pnpm run build

      # ✅ Validate output
      - name: Check build output
        run: |
          if [ -d "./out" ] && [ "$(ls -A ./out)" ]; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
            ls -la
            exit 1
          fi

      # ✅ Upload artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
