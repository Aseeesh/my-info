name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /my-info
      NEXT_PUBLIC_BASE_URL: https://ashishrijal.com.np

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create .nojekyll file
        run: |
          mkdir -p public
          touch public/.nojekyll
          echo "✅ Created .nojekyll file"

      - name: Build with Next.js
        id: build
        run: |
          pnpm run build 2>&1 | tee build.log
          echo "Build completed with exit code: $?"

      - name: Check build output
        run: |
          echo "Checking for out directory..."
          if [ -d "./out" ] && [ "$(ls -A ./out)" ]; then
            echo "✅ out directory exists and is not empty"
            echo "Contents of out directory:"
            ls -la ./out/
            echo "Number of files: $(find ./out -type f | wc -l)"
          else
            echo "❌ Build failed: out directory is missing or empty"
            echo "Current directory contents:"
            ls -la
            echo ""
            echo "Build log:"
            cat build.log
            exit 1
          fi

      - name: Upload Pages Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
